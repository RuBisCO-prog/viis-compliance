<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viis Compliance</title>
  <script src="js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#212121;--bg-card:#2a2a2a;--t1:#ececec;--t2:#9b9ba8;--t3:rgba(255,255,255,0.22);--sep:rgba(255,255,255,0.1);--inp:rgba(255,255,255,0.06)}
    html[data-theme="light"]{--bg:#f5f5f5;--bg-card:#ffffff;--t1:#111111;--t2:#6b7280;--t3:rgba(0,0,0,0.3);--sep:rgba(0,0,0,0.1);--inp:rgba(0,0,0,0.05)}
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 340px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 44px;
    }

    .logo svg { margin-bottom: 14px; }

    .logo-wordmark {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo-tagline {
      font-size: 8px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 2.2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .form-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 6px;
    }

    .form-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.3px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: rgba(255,255,255,0.35);
    }

    input::placeholder { color: rgba(255,255,255,0.18); }

    .error-msg {
      display: none;
      padding: 10px 14px;
      background: rgba(239,68,68,0.08);
      border: 0.5px solid rgba(239,68,68,0.22);
      border-radius: 7px;
      font-size: 12px;
      color: #F87171;
    }

    .error-msg.visible { display: block; }

    .btn {
      width: 100%;
      padding: 11px;
      margin-top: 2px;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.2px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 52px;
      font-size: 11px;
      color: rgba(255,255,255,0.13);
      text-align: center;
      letter-spacing: 0.2px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="wrap">

    <div class="logo">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#888888"/>
            <stop offset="100%" stop-color="#ffffff"/>
          </linearGradient>
        </defs>
        <circle cx="8.5" cy="5" r="2.3" fill="url(#lg)"/>
        <circle cx="15.5" cy="5" r="2.3" fill="url(#lg)"/>
        <path d="M3.5 9.5 L12 21 L20.5 9.5" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-wordmark">viis</div>
      <div class="logo-tagline">compliance</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginView">
      <form class="form" id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn" id="loginBtn">Sign in</button>
      </form>
    </div>

    <!-- SET PASSWORD FORM (shown on invite) -->
    <div id="setPasswordView" class="hidden">
      <div class="form-title">Welcome to Viis</div>
      <div class="form-subtitle">You have been invited. Set a password to activate your account.</div>
      <form class="form" id="setPasswordForm" novalidate>
        <div class="field">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" placeholder="Min. 8 characters" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        </div>
        <div class="error-msg" id="setPasswordError"></div>
        <button type="submit" class="btn" id="setPasswordBtn">Activate account</button>
      </form>
    </div>

    <div class="footer">Access is by invitation only.</div>

  </div>

  <script>
    const SUPABASE_URL  = 'https://qftzakhljmkxlinznjtp.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmdHpha2hsam1reGxpbnpuanRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDc2NDQsImV4cCI6MjA5NjMyMzY0NH0.WSz9Ao9HF-1Sv1webc9PpUkSvoW5YtCsD7gyvozYPl8';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    const loginView       = document.getElementById('loginView');
    const setPasswordView = document.getElementById('setPasswordView');

    // Detect invite or recovery token in URL hash
    const hash   = window.location.hash;
    const isInvite = hash.includes('type=invite') || hash.includes('type=recovery');

    if (isInvite) {
      loginView.classList.add('hidden');
      setPasswordView.classList.remove('hidden');
    } else {
      // If already logged in, go straight to the app
      (async () => {
        const { data: { session } } = await db.auth.getSession();
        if (session) window.location.href = 'documents.html';
      })();
    }

    // ── LOGIN ────────────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('loginError');
      const btn     = document.getElementById('loginBtn');
      errorEl.classList.remove('visible');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = 'Incorrect email or password.';
        errorEl.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
        return;
      }

      window.location.href = 'documents.html';
    });

    // ── SET PASSWORD ─────────────────────────────────────────────────────────
    document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('setPasswordError');
      const btn     = document.getElementById('setPasswordBtn');
      errorEl.classList.remove('visible');

      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.classList.add('visible');
        return;
      }

      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Activating…';

      const { error } = await db.auth.updateUser({ password: newPassword });

      if (error) {
        errorEl.textContent = 'Something went wrong. Try requesting a new invite.';
        errorEl.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Activate account';
        return;
      }

      window.location.href = 'documents.html';
    });
  </script>

</body>
</html>
